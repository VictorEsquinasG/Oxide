name: RustVPN

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    # Install Linux Dependences
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'          
      run: |
            sudo apt-get update
            sudo apt-get install -y libgtk-3-dev libglib2.0-dev pkg-config libssl-dev
        
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
